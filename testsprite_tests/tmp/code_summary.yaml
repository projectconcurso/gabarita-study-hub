version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React
  - Vite
  - TailwindCSS
  - Supabase
  - React Router
  - Tanstack Query
  - Radix UI
  - Chart.js
  - Shadcn UI
routes:
  - path: /
    file: src/pages/Index.tsx
    auth_required: false
    description: Landing page with features and call to action
  - path: /login
    file: src/pages/Login.tsx
    auth_required: false
    description: User login page
  - path: /signup
    file: src/pages/Signup.tsx
    auth_required: false
    description: User registration page
  - path: /plan-selection
    file: src/pages/PlanSelection.tsx
    auth_required: false
    description: Subscription plan selection page
  - path: /confirm-email
    file: src/pages/ConfirmEmail.tsx
    auth_required: false
    description: Email confirmation page
  - path: /reset-password
    file: src/pages/ResetPassword.tsx
    auth_required: false
    description: Password reset page
  - path: /complete-profile
    file: src/pages/CompleteProfile.tsx
    auth_required: true
    description: Complete user profile after signup
  - path: /dashboard
    file: src/pages/dashboard/Home.tsx
    auth_required: true
    description: Main dashboard home page
  - path: /dashboard/simulados
    file: src/pages/dashboard/Simulados.tsx
    auth_required: true
    description: Practice exams and quizzes listing
  - path: /dashboard/simular/:id
    file: src/pages/dashboard/Simular.tsx
    auth_required: true
    description: Take a practice exam
  - path: /dashboard/meus-estudos
    file: src/pages/dashboard/MeusEstudos.tsx
    auth_required: true
    description: Study schedule management
  - path: /dashboard/meu-cronograma
    file: src/pages/dashboard/MeuCronograma.tsx
    auth_required: true
    description: Study timeline view
  - path: /dashboard/meu-cronograma/:id
    file: src/pages/dashboard/DetalhesConcurso.tsx
    auth_required: true
    description: Exam details and study materials
  - path: /dashboard/apostila/:assuntoId
    file: src/pages/dashboard/VisualizarApostila.tsx
    auth_required: true
    description: View study guide for a subject
  - path: /dashboard/mural
    file: src/pages/dashboard/Mural.tsx
    auth_required: true
    description: Social feed with posts and interactions
  - path: /dashboard/amigos
    file: src/pages/dashboard/Amigos.tsx
    auth_required: true
    description: Friends list and friend requests
  - path: /dashboard/amigos/:id
    file: src/pages/dashboard/PerfilAmigo.tsx
    auth_required: true
    description: View friend profile
  - path: /dashboard/chat
    file: src/pages/dashboard/Chat.tsx
    auth_required: true
    description: Direct messaging with friends
  - path: /dashboard/perfil
    file: src/pages/dashboard/Perfil.tsx
    auth_required: true
    description: User profile settings
  - path: /dashboard/loja
    file: src/pages/dashboard/LojaGabaritos.tsx
    auth_required: true
    description: Store to purchase answer keys
features:
  - name: User Authentication
    description: Login and signup with email and password using Supabase
    files:
      - src/pages/Login.tsx
      - src/pages/Signup.tsx
      - src/integrations/supabase/client.ts
    entry_route: /login
    user_interactions:
      - Navigate to login page
      - Fill email input field
      - Fill password input field
      - Click login button
      - See error message on invalid credentials
      - Navigate to signup page
      - Fill signup form with name, email, password
      - Submit signup form
      - Redirect to email confirmation
    api_calls:
      - method: POST
        endpoint: /auth/v1/token
      - method: POST
        endpoint: /auth/v1/signup
    auth_required: false
  - name: Practice Exams
    description: Browse and take practice exams with questions and answers
    files:
      - src/pages/dashboard/Simulados.tsx
      - src/pages/dashboard/Simular.tsx
      - src/components/QuestionContent.tsx
    entry_route: /dashboard/simulados
    user_interactions:
      - View list of available practice exams
      - Click on exam to start
      - Read questions with charts, tables, and images
      - Select answer options
      - Navigate between questions
      - Submit exam
      - View results and score
    api_calls:
      - method: GET
        endpoint: /rest/v1/simulados
      - method: GET
        endpoint: /rest/v1/questoes
      - method: POST
        endpoint: /rest/v1/respostas_usuario
    auth_required: true
  - name: Study Schedule
    description: Create and manage study schedules for exams
    files:
      - src/pages/dashboard/MeusEstudos.tsx
      - src/pages/dashboard/DetalhesConcurso.tsx
      - src/components/meus-estudos/CriarConcursoDialog.tsx
    entry_route: /dashboard/meus-estudos
    user_interactions:
      - Click create study schedule button
      - Fill exam name input
      - Select education level
      - Set exam date
      - Add subjects and topics
      - Click create button
      - View study schedule cards
      - Click on schedule to view details
      - Track progress per subject
    api_calls:
      - method: GET
        endpoint: /rest/v1/concursos
      - method: POST
        endpoint: /rest/v1/concursos
      - method: GET
        endpoint: /rest/v1/materias
      - method: POST
        endpoint: /rest/v1/materias
    auth_required: true
  - name: Social Feed
    description: View and interact with posts from friends
    files:
      - src/pages/dashboard/Mural.tsx
    entry_route: /dashboard/mural
    user_interactions:
      - View feed of posts
      - Like posts
      - Comment on posts
      - Click on user avatar to view profile
      - Create new post
      - Upload images to post
    api_calls:
      - method: GET
        endpoint: /rest/v1/posts
      - method: POST
        endpoint: /rest/v1/posts
      - method: POST
        endpoint: /rest/v1/curtidas
      - method: POST
        endpoint: /rest/v1/comentarios
    auth_required: true
  - name: Friends Management
    description: Add friends, view friend list, and manage friend requests
    files:
      - src/pages/dashboard/Amigos.tsx
      - src/pages/dashboard/PerfilAmigo.tsx
    entry_route: /dashboard/amigos
    user_interactions:
      - View list of friends
      - Search for users
      - Send friend request
      - Accept or decline friend requests
      - View friend profile
      - Remove friend
    api_calls:
      - method: GET
        endpoint: /rest/v1/amizades
      - method: POST
        endpoint: /rest/v1/amizades
      - method: PATCH
        endpoint: /rest/v1/amizades
      - method: DELETE
        endpoint: /rest/v1/amizades
    auth_required: true
  - name: Direct Messaging
    description: Chat with friends in real-time
    files:
      - src/pages/dashboard/Chat.tsx
    entry_route: /dashboard/chat
    user_interactions:
      - View list of conversations
      - Click on contact to open chat
      - Type message in input field
      - Send message
      - View message history
      - See messages grouped by date
    api_calls:
      - method: GET
        endpoint: /rest/v1/mensagens
      - method: POST
        endpoint: /rest/v1/mensagens
      - method: GET
        endpoint: /rest/v1/profiles
    auth_required: true
  - name: User Profile
    description: View and edit user profile information
    files:
      - src/pages/dashboard/Perfil.tsx
      - src/pages/CompleteProfile.tsx
    entry_route: /dashboard/perfil
    user_interactions:
      - View profile information
      - Edit name and bio
      - Upload profile photo
      - Change password
      - Update email
      - Save changes
    api_calls:
      - method: GET
        endpoint: /rest/v1/profiles
      - method: PATCH
        endpoint: /rest/v1/profiles
      - method: POST
        endpoint: /storage/v1/object/avatars
    auth_required: true
known_limitations:
  - issue: Chart rendering on mobile has overflow issues
    location: src/components/QuestionContent.tsx
    impact: Charts may be difficult to read on small screens
  - issue: Modal dialogs may have horizontal scroll on very small screens
    location: src/components/meus-estudos/CriarConcursoDialog.tsx
    impact: User experience degraded on devices under 320px width
